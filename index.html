        <h1>RAJ NEXUS – 3-in-1 Qi2.2 Wireless Charger</h1>
        <h2>Ein Ladegerät. Ein Kabel. Drei Geräte.</h2>
        <p>Der RAJ NEXUS ist der erste Schweizer Premium 3-in-1 Wireless Charger. Laden Sie Ihr iPhone, Ihre Apple Watch und Ihre AirPods gleichzeitig — mit einem einzigen, elegant designten Gerät. Qi2.2-zertifiziert, bis zu 25W, faltbar und reisefreundlich.</p>

        <h3>Warum RAJ NEXUS?</h3>
        <p>Qi2.2-zertifiziert für schnellstes kabelloses Laden. Swiss Brand. Premium-Materialien aus Aluminium und Silikon. Kompaktes Falt-Design für unterwegs. CE-zertifiziert. Kompatibel mit MagSafe.</p>

        <h3>Founder Edition – CHF 99 (statt CHF 129)</h3>
        <p>Lebenslanger Early Access zu neuen RAJ Produkten. Founder Edition mit persönlicher Seriennummer. CHF 30 sparen gegenüber dem regulären Preis von CHF 129. Nur solange der Vorrat reicht.</p>

        <h3>Kompatibilität</h3>
        <p>iPhone 12, 13, 14, 15, 16 und 17 Serie. Apple Watch Series 1 bis 10 und Apple Watch Ultra. AirPods Pro, AirPods 3 und AirPods 4 mit kabellosem Ladecase.</p>

        <h3>Technische Daten</h3>
        <p>Ladestandard: Qi2.2 (Wireless Power Consortium zertifiziert). Maximale Ladeleistung: 25W (iPhone aktuell 15W). Apple Watch: 5W. AirPods: 5W. Anschluss: USB-C. Gewicht: ca. 200g. Design: Faltbar mit verstellbarem Winkel. Zertifizierungen: CE, Qi2.2.</p>

        <h3>Häufige Fragen</h3>
        <p><strong>Was ist Qi2.2?</strong> Qi2.2 ist die neueste Version des kabellosen Ladestandards mit verbesserter Effizienz, besserem Wärmemanagement und bis zu 25W Ladeleistung.</p>
        <p><strong>Wo kann ich den RAJ NEXUS kaufen?</strong> Exklusiv auf raj.ch — direkt vom Hersteller, ohne Zwischenhändler. Versand innerhalb der Schweiz.</p>
        <p><strong>Wie schnell lädt der RAJ NEXUS?</strong> Ein iPhone ist in ca. 1,5 Stunden vollständig geladen — bis zu 3,3x schneller als herkömmliche 5W Qi-Ladegeräte.</p>
        <p><strong>Funktioniert der RAJ NEXUS mit einer Hülle?</strong> Ja, der RAJ NEXUS funktioniert mit allen MagSafe-kompatiblen Hüllen und den meisten Hüllen bis 3mm Dicke.</p>

        <h3>Über RAJ</h3>
        <p>RAJ ist eine Schweizer Premium-Elektronikmarke mit Sitz in Weinfelden, Thurgau. Unsere Werte: Präzision, Beständigkeit, Charakter. Unser Versprechen: Power. Always There.</p>

        <p><strong>RAJ GmbH (in Gründung) · Weinfelden · Schweiz</strong></p>
